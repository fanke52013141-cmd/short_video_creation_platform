project:
  name: "short_video_creation_platform"
  version: "1.0.4"
  description: "短视频生产前置流程：剧本、风格、分镜、资产、分镜图和视频提示词"

runtime:
  require_user_confirmation_between_major_phases: true
  image_generation_mode_default: "external_manual"
  allowed_image_generation_modes:
    - "jimeng_web_manual"
    - "chatgpt_web"
    - "codex_direct"
    - "external_manual"
  video_generation_mode_default: "jimeng_canvas_manual"

skill_versions:
  story_generation: "3.0.0"
  art_direction: "2.1.0"
  storyboard_director: "2.3.0"
  asset_executor: "1.4.0"
  character_prompt_generator: "2.4.0"
  scene_prompt_generator: "2.3.0"
  prop_prompt_generator: "2.3.0"
  image_generation_executor: "1.3.0"
  storyboard_prompt_generator: "1.1.0"
  video_prompt_generator: "2.6.0"

phase_order:
  - story_generation
  - art_direction
  - storyboard_director
  - asset_executor
  - asset_prompt_generation
  - storyboard_prompt_generator
  - video_prompt_generator

paths:
  story_md: "./outputs/story.md"
  style_bible: "./outputs/style_bible.md"
  storyboard_json: "./outputs/storyboard.json"
  asset_manifest: "./outputs/asset_manifest.json"
  shot_asset_map: "./outputs/shot_asset_map.json"
  assets_root: "./outputs/assets"
  storyboard_reference_dir: "./outputs/storyboards"
  storyboard_prompts: "./outputs/storyboard_prompts.md"
  video_prompts: "./outputs/video_prompts.md"
  video_prompts_json: "./outputs/video_prompts.json"

prompt_sources:
  story_generation: "./skills/raw_prompts/story_generation.source.md"
  art_direction: "./skills/raw_prompts/art_direction.source.md"
  storyboard_director: "./skills/raw_prompts/storyboard_director.source.md"
  character_prompt_generator: "./skills/raw_prompts/character_prompt_generator.source.md"
  scene_prompt_generator: "./skills/raw_prompts/scene_prompt_generator.source.md"
  prop_prompt_generator: "./skills/raw_prompts/prop_prompt_generator.source.md"
  storyboard_prompt_generator: "./skills/raw_prompts/storyboard_prompt_generator.source.md"
  video_prompt_generator: "./skills/raw_prompts/seedance_video_prompt.source.md"

schemas:
  storyboard: "./schemas/storyboard.schema.json"
  asset_manifest: "./schemas/asset_manifest.schema.json"
  shot_asset_map: "./schemas/shot_asset_map.schema.json"
  video_prompt: "./schemas/video_prompt.schema.json"

story_policy:
  output: "story.md"
  forbidden_outputs:
    - "story.json"
    - "story_index.json"

style_bible_policy:
  required_sections:
    - "画面风格"
    - "整体色调"
    - "光线风格"
    - "AI 视觉执行要求"
  forbidden_sections:
    - "构图倾向"
    - "禁止出现的视觉元素"

storyboard_policy:
  max_shot_duration_seconds: 15
  required_shot_fields:
    - shot_id
    - scene_id
    - duration_seconds
    - framing
    - camera_move
    - action_desc
  forbidden_shot_fields:
    - characters_in_shot
    - location
    - character_ids
    - prop_ids
    - asset_ids
    - prompt_cn

asset_policy:
  character_asset_name_pattern: "人物稳定名或人物稳定名_持续变体"
  character_image_output: "single_21x9_multi_view_image"
  scene_split_only_for:
    - "spatial_structure_change"
    - "location_change"
    - "story_space_change"
  prop_default_handling: "text_prompt_control"
  asset_prompt_inputs:
    - "story.md"
    - "style_bible.md"
    - "asset_type"
    - "asset_name"
    - "output_prompt_path"

storyboard_prompt_policy:
  required_per_shot_fields:
    - "frame_role"
    - "uses_previous_storyboard_reference"
  frame_roles:
    - "first_frame"
    - "last_frame"
    - "keyframe"
  previous_reference_purpose: "placement_anchor"
  previous_reference_scope: "same_scene_id_only"

video_prompt_policy:
  max_video_prompt_duration_seconds: 15
  required_inputs:
    - "storyboard.json"
    - "storyboard_prompts.md"
    - "outputs/storyboards/"
    - "shot_asset_map.json"
    - "outputs/assets/"
  merge_requirements:
    - "shot_id_contiguous"
    - "same_scene_id"
    - "duration_sum_lte_15s"
    - "duration_seconds_equals_source_shot_sum"
    - "no_scene_time_or_story_space_jump"
  required_json_fields:
    - "merge_decision"
    - "frame_references"
  previous_storyboard_anchor: "参考@上一分镜_站位，保持人物空间关系、朝向和相对位置不变"
  forbidden_blocks:
    - "English Prompt"
    - "中英对照"
    - "@PROP"

final_handoff:
  included:
    - "outputs/story.md"
    - "outputs/video_prompts.md"
    - "outputs/video_prompts.json"
    - "outputs/assets/characters/"
    - "outputs/assets/scenes/"
    - "outputs/storyboards/"
