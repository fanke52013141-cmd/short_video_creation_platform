project:
  name: "ai_short_film_pipeline"
  version: "0.5.0"
  description: "将想法转化为 AI 短片生产包的 Skill-Oriented 工作流"

runtime:
  mode: "draft"
  max_retries: 2
  timeout_seconds: 120
  log_level: "info"
  require_user_confirmation_between_major_phases: true
  image_generation_mode_default: "ask_user"
  allowed_image_generation_modes:
    - "external_manual"
    - "internal_codex"
  video_generation_mode_default: "external_manual"
  editing_mode_default: "external_manual"

model_defaults:
  text_provider: "to_be_configured"
  text_model_name: "to_be_configured"
  image_provider: "to_be_configured"
  image_model_name: "to_be_configured"
  video_provider: "jimeng_seedance_2_0"
  video_model_name: "Seedance 2.0"
  temperature:
    story_generation: 0.7
    art_direction: 0.45
    storyboard_director: 0.55
    storyboard_sequence_review: 0.2
    asset_prompt_generation: 0.45
    video_prompt_generation: 0.35
    continuity_review: 0.2
  max_tokens: 8000

skill_versions:
  story_generation: "1.0.1"
  art_direction: "1.0.1"
  storyboard_director: "1.3.0"
  storyboard_static_frame_variant: "1.0.0"
  storyboard_sequence_review: "0.4.0"
  asset_manifest_builder: "0.5.0"
  character_prompt_generator: "1.2.0"
  scene_prompt_generator: "1.1.0"
  prop_prompt_generator: "1.1.0"
  image_generation_executor: "0.2.0"
  voice_reference_manifest_builder: "0.2.0"
  shot_video_prompt_generator: "1.3.0"
  external_generation_handoff: "0.4.0"
  generated_media_review: "0.1.0"
  continuity_review: "0.4.0"
  production_package_builder: "0.2.0"

paths:
  active_run_dir: "./local_runs/YYYY-MM-DD/project_slug"
  input_dir: "./local_runs/YYYY-MM-DD/project_slug/inputs"
  local_runs_dir: "./local_runs"
  raw_prompt_dir: "./skills/raw_prompts"
  output_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs"
  reference_dir: "./local_runs/YYYY-MM-DD/project_slug/references"
  log_dir: "./local_runs/YYYY-MM-DD/project_slug/logs"
  checkpoint_template_file: "./checkpoint.template.json"
  checkpoint_file: "./local_runs/YYYY-MM-DD/project_slug/checkpoint.json"
  story_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/01_story"
  art_direction_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/02_art_direction"
  storyboard_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/03_storyboard"
  storyboard_sequence_review_file: "./local_runs/YYYY-MM-DD/project_slug/outputs/03_storyboard/storyboard_sequence_review.md"
  asset_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/04_assets"
  image_generation_queue_file: "./local_runs/YYYY-MM-DD/project_slug/outputs/04_assets/image_generation_queue.json"
  final_image_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/04_assets/final_images"
  audio_asset_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/04_assets/audio"
  video_prompt_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/05_video_prompts"
  shot_prompt_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/05_video_prompts/shots"
  external_results_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/06_external_results"
  image_result_manifest_file: "./local_runs/YYYY-MM-DD/project_slug/outputs/06_external_results/image_result_manifest.json"
  shot_result_manifest_file: "./local_runs/YYYY-MM-DD/project_slug/outputs/06_external_results/shot_result_manifest.json"
  generated_media_review_file: "./local_runs/YYYY-MM-DD/project_slug/outputs/06_external_results/generated_media_review.md"
  final_delivery_dir: "./local_runs/YYYY-MM-DD/project_slug/outputs/07_final_delivery"

prompt_sources:
  story_generation: "./skills/raw_prompts/story_generation.source.md"
  art_direction: "./skills/raw_prompts/art_direction.source.md"
  storyboard_director: "./skills/raw_prompts/storyboard_director.source.md"
  storyboard_static_frame_variant: "./skills/raw_prompts/storyboard_static_frame_variant.source.md"
  character_prompt_generator: "./skills/raw_prompts/character_prompt_generator.source.md"
  scene_prompt_generator: "./skills/raw_prompts/scene_prompt_generator.source.md"
  prop_prompt_generator: "./skills/raw_prompts/prop_prompt_generator.source.md"
  shot_video_prompt_generator: "./skills/raw_prompts/seedance_video_prompt.source.md"

schemas:
  story: "./schemas/story.schema.json"
  art_direction: "./schemas/art_direction.schema.json"
  storyboard: "./schemas/storyboard.schema.json"
  storyboard_sequence_review: "./schemas/storyboard_sequence_review.schema.json"
  asset_manifest: "./schemas/asset_manifest.schema.json"
  voice_reference_manifest: "./schemas/voice_reference_manifest.schema.json"
  shot_video_prompt: "./schemas/shot_video_prompt.schema.json"
  image_result_manifest: "./schemas/image_result_manifest.schema.json"
  shot_result_manifest: "./schemas/shot_result_manifest.schema.json"
  generated_media_review: "./schemas/generated_media_review.schema.json"
  continuity_report: "./schemas/continuity_report.schema.json"
  final_package_manifest: "./schemas/final_package_manifest.schema.json"

asset_id_policy:
  character_prefix: "CHAR"
  scene_prefix: "ENV"
  prop_prefix: "PROP"
  audio_prefix: "AUDIO"
  style_prefix: "STYLE"
  numbering: "001"
  variant_suffix: "A, B, C"

output_formats:
  human_readable: "markdown"
  machine_readable: "json"
  video_prompt_language: "zh"
  asset_prompt_language: "zh"
  video_prompt_generation_mode: "per_shot_loop"

image_generation_policy:
  priority_classes:
    - "must_generate"
    - "optional_generate"
    - "skip_generation"
  image_roles:
    - "character_turnaround"
    - "character_full_body"
    - "scene_key_plate"
    - "scene_sheet"
    - "prop_standard_asset"
    - "prop_detail_closeup"
  blocking_statuses:
    - "missing"
    - "rejected"
    - "needs_regeneration"
  completed_requires_no_blocking_missing_images: true
  scene_reference_priority: "key_plate"
  prop_reference_default: "describe_in_prompt_not_at_ref"

storyboard_generation_policy:
  max_shot_duration_seconds: 15
  concretization_translation_required: true
  abstract_terms_must_have_visual_evidence: true
  critical_turning_points_require_visible_evidence: true
  concrete_evidence_dimensions:
    - "emotion_to_microexpression"
    - "atmosphere_to_light_and_sound"
    - "event_to_action"
    - "relationship_to_space"

external_services:
  seedance:
    enabled: false
    execution_mode: "manual_web"
    api_key_env: "SEEDANCE_API_KEY"
    base_url: ""
    output_resolution: "to_be_configured"
    duration_seconds_default: 5
  image_generation:
    enabled: false
    execution_mode: "manual_web"
    api_key_env: "IMAGE_API_KEY"
    base_url: ""

external_workflow:
  image_generation:
    mode_selection_required: true
    supported_modes:
      external_manual: "Codex outputs image prompts, an image generation queue, and handoff instructions; user generates images in external web tools."
      internal_codex: "Codex uses the same image generation queue to generate images and saves results to the local run."
    suggested_tools:
      - "CodeX/ChatGPT web image generation"
      - "other external image tools"
    codex_output: "asset prompts, image_generation_queue.json, image_result_manifest.json; optionally generated local images when user selects internal_codex"
  video_generation:
    executed_outside_codex: true
    suggested_tools:
      - "Jimeng / Seedance web"
    codex_output: "shot-level Chinese video prompts and reference declarations only"
  editing:
    executed_outside_codex: true
    suggested_tools:
      - "Jianying / CapCut"
    codex_output: "edit decision notes and shot manifest only"

quality_gates:
  require_phase_order: true
  require_schema_validation: true
  require_asset_id_resolution: true
  require_style_bible_before_storyboard: true
  require_storyboard_before_video_prompts: true
  require_storyboard_sequence_review_before_assets: true
  block_assets_on_unresolved_p1: true
  require_storyboard_concretization_translation: true
  require_storyboard_concretization_review: true
  block_key_turning_points_without_visual_evidence: true
  require_character_three_view_for_main_characters: true
  require_character_identity_anchors: true
  require_character_variant_triggers: true
  require_character_variant_must_keep: true
  require_asset_manifest_character_variant_policy: true
  require_prop_generation_decision: true
  require_prop_generation_reason: true
  require_prop_must_not_change_for_generated_props: true
  require_text_prop_generation_strategy: true
  forbid_unnecessary_prop_assets: true
  require_image_generation_queue: true
  require_image_generation_priority: true
  require_image_blocking_flags: true
  require_image_results_for_must_generate: true
  block_completed_on_missing_required_images: true
  require_audio_reference_for_dialogue_shots: true
  require_per_shot_video_prompt_files: true
  allow_env_reference_only_when_spatial_expansion_needed: true
  forbid_prop_reference_in_video_prompts_by_default: true
  require_generated_media_review_before_completed: true
  require_continuity_review_before_final_delivery: true
  max_storyboard_shot_duration_seconds: 15
  require_storyboard_shot_boundary_reason: true
  block_artificial_continuous_shot_splitting: true
  require_scene_key_plate_prompt: true
  scene_sheet_generation_policy: "required_for_complex_or_recurring_scenes"
  scene_reference_priority: "key_plate"
