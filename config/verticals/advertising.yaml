schema_version: "1.0"
id: advertising
name: 广告短视频
description: 面向品牌广告、商品广告和效果广告的短视频生产包。

skill_overrides:
  content_strategy: advertising-content-strategy
  art_direction: advertising-art-direction
  storyboard_strategy: advertising-storyboard-strategy
  prompt_strategy: advertising-prompt-strategy
  vertical_quality_gate: advertising-quality-gate

content_contract:
  required_sidecar: true
  path: ./outputs/content_contract.json
  schema: ./schemas/content_contract.schema.json

production:
  aspect_ratios: ["9:16", "1:1", "16:9"]
  duration_presets_seconds: [6, 15, 30]
  default_duration_seconds: 15
  max_generated_clip_seconds: 15
  hook_deadline_seconds: 3

required_asset_roles:
  - product_packshot
  - product_in_use
  - scene_key_plate
  - brand_end_card

quality_gates:
  - audience_defined
  - single_primary_message
  - claim_has_evidence
  - product_identity_consistent
  - brand_constraints_respected
  - call_to_action_present
  - platform_duration_valid

policies:
  unsupported_claims: block
  unreadable_packaging_text: regenerate_or_use_post_overlay
  logo_mutation: block
  mandatory_disclaimer: 待确认

