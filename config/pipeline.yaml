schema_version: "1.0"

vertical_selection:
  default: narrative
  profiles_dir: ./config/verticals
  checkpoint_field: vertical.id

strategy_slots:
  content_strategy:
    default_skill: story_generation
    output: ./outputs/story.md
  art_direction:
    default_skill: art_direction
    output: ./outputs/style_bible.md
  storyboard_strategy:
    default_skill: storyboard_director
    output: ./outputs/storyboard.json
  prompt_strategy:
    default_skill: storyboard_prompt_generator
  vertical_quality_gate:
    default_skill: storyboard_visual_review

stages:
  - id: story_generation
    type: strategy
    slot: content_strategy
    approval_required: true
  - id: art_direction
    type: strategy
    slot: art_direction
    approval_required: true
  - id: storyboard_director
    type: strategy
    slot: storyboard_strategy
  - id: storyboard_sequence_review
    type: quality_gate
    skill: storyboard_sequence_review
    blocks_on: [P0]
  - id: asset_executor
    type: stable_core
    skill: asset_executor
  - id: asset_prompt_generation
    type: stable_core
    skill: asset_prompt_generators
  - id: asset_image_generation
    type: stable_core
    skill: image_generation_executor
  - id: generated_asset_review
    type: quality_gate
    skill: generated_asset_review
    blocks_on: [P0]
  - id: video_segment_planning
    type: stable_core
    skill: video_segment_planner
  - id: storyboard_prompt_generation
    type: strategy
    slot: prompt_strategy
  - id: storyboard_image_generation
    type: stable_core
    skill: image_generation_executor
  - id: storyboard_visual_review
    type: quality_gate
    skill: storyboard_visual_review
    blocks_on: [P0]
  - id: video_prompt_generation
    type: stable_core
    skill: video_prompt_generator
  - id: vertical_quality_gate
    type: strategy
    slot: vertical_quality_gate
  - id: final_package
    type: stable_core
    skill: package_production
