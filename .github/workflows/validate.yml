name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile validator
        run: python -m py_compile scripts/validate_project.py

      - name: Parse JSON contracts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in [Path('checkpoint.template.json'), *Path('schemas').glob('*.json')]:
              json.loads(path.read_text(encoding='utf-8-sig'))
              print(f'OK {path}')
          PY

      - name: Validate minimal example run
        run: python scripts/validate_project.py examples/minimal_run --phase all
