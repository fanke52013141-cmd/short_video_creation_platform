name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile validators
        run: |
          python -m compileall -q scripts

      - name: Parse JSON contracts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in [Path('checkpoint.template.json'), *Path('schemas').glob('*.json')]:
              json.loads(path.read_text(encoding='utf-8-sig'))
              print(f'OK {path}')
          PY

      - name: Validate minimal example run
        run: |
          python scripts/validate_pipeline_contract.py
          python scripts/validate_vertical_config.py
          python scripts/validate_asset_semantics.py examples/minimal_run
          python scripts/validate_project.py examples/minimal_run --level draft

      - name: Validate minimal video prompts
        run: python scripts/validate_seedance_video_prompts.py examples/minimal_run

      - name: Enforce repository policy
        run: python scripts/check_repository_policy.py
